name: Update CN_IP staging artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: cn-ip-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Download primary and cross-check sources
        shell: bash
        run: |
          set -euo pipefail

          download_checked() {
            local url="$1"
            local output="$2"
            local -a metadata=()

            mapfile -t metadata < <(
              curl \
                --fail \
                --show-error \
                --silent \
                --location \
                --retry 3 \
                --retry-all-errors \
                --connect-timeout 10 \
                --max-time 60 \
                --max-filesize 2097152 \
                --proto '=https' \
                --tlsv1.2 \
                --output "$output" \
                --write-out '%{http_code}\n%{content_type}\n%{size_download}\n' \
                "$url"
            )

            if (( ${#metadata[@]} != 3 )); then
              echo "$url returned incomplete response metadata" >&2
              return 1
            fi
            test "${metadata[0]}" = "200"
            case "${metadata[1]}" in
              text/plain*) ;;
              *) echo "$url returned unexpected Content-Type: ${metadata[1]}" >&2; return 1 ;;
            esac
            test "${metadata[2]}" -gt 0
          }

          download_checked \
            "https://ispip.clang.cn/all_cn_cidr.txt" \
            all_cn_cidr.txt
          download_checked \
            "https://raw.githubusercontent.com/fernvenue/chn-cidr-list/master/ipv4.txt" \
            crosscheck_ipv4.txt

      - name: Validate and build staging artifacts
        run: |
          python scripts/build_cn_ip.py \
            --input all_cn_cidr.txt \
            --output all_cn_cidr_stage.rsc \
            --manifest cn_ip_manifest.json \
            --previous-rsc all_cn_cidr_stage.rsc \
            --previous-rsc all_cn_cidr.rsc \
            --previous-manifest cn_ip_manifest.json \
            --source-url https://ispip.clang.cn/all_cn_cidr.txt \
            --crosscheck-input crosscheck_ipv4.txt \
            --crosscheck-source-url https://raw.githubusercontent.com/fernvenue/chn-cidr-list/master/ipv4.txt \
            --shard-directory . \
            --shard-prefix cn_ip_part_ \
            --shard-size 1000

      - name: Validate repository diff
        run: git diff --check

      - name: Commit generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain -- all_cn_cidr_stage.rsc cn_ip_manifest.json 'cn_ip_part_*.json')" ]]; then
            echo "No source changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- all_cn_cidr_stage.rsc cn_ip_manifest.json 'cn_ip_part_*.json'
          git commit -m "Auto-update CN_IP staging artifacts $(date -u +'%Y-%m-%d')"
          git push origin "HEAD:${GITHUB_REF_NAME}"
